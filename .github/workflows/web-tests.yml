name: Web Tests (Chrome)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run web tests
        env:
          BASE_URL: https://replaceit.ai
          HEADLESS: "1"
        run: pytest tests/ --pw-browser=chromium --html=reports/web-report.html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-report
          path: reports/
          retention-days: 14
